<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #ffffd9; 
            font-family: 'Times New Roman', Times, serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12%;
        }
        .tracker-card {
            background-color: #f0bcd4; 
            border-radius: 20px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .tracker-title {
            color: #ffffff; 
            text-align: center;
            font-weight: bold;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .btn-submit {
            background-color: #ffffd9; 
            font-weight: bold;
            border-radius: 10px;
            height: 50px;
            width: 100%;
            border: 1px solid #ddd;
        }
        .accent-bar {
            background-color: #ffffd9; 
            height: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }
        #graph-container {
            background-color: white;
            display: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 510px;
        }
    </style>
</head>
<body>

<!-- Form -->
<div class="container">
    <div class="row justify-content-center align-items-center g-4">
        
        <div class="col-lg-4 col-md-6 col-sm-10">
            <div class="card p-4 tracker-card">
                <h1 class="tracker-title">Attendance Tracker</h1>
                
                <div class="mb-3">
                    <label><b>Select Day</b></label>
                    <select id="section" class="form-select">
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label><b>Absences</b></label>
                    <input type="number" id="math" class="form-control" min="0" placeholder="Enter number">
                </div>

                <button py-click="update_and_plot" class="btn btn-submit">Submit</button>
                <div class="accent-bar"></div>
            </div>
        </div>

        <div class="col-md-5 d-flex justify-content-center">
            <div id="graph-container">
                <div id="output"></div>
            </div>
        </div>

    </div>
</div>

<!-- Graph -->
<py-config>
    packages = ['numpy', 'matplotlib']
</py-config>

<!-- Python File -->
<script type="py" src="main.py"></script>

</body>
</html>
